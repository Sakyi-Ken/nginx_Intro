worker_processes 1;
events { 
    worker_connections 1024; 
}
http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile on;

    server {
        listen 5000;
        server_name localhost;
        root C:/Users/User/PROS/nginx_Intro/Lesson_1;  # document root for static files
        index index.html;  # default file to serve at /

        # TODO: Add exact-match location for root path (/) that tries index.html first, then falls back to @inline
        location = / { 
            try_files /index.html @inline; 
        }

        # TODO: Add named location @inline that returns inline HTML with status 200
        location @inline {
            default_type text/html;
            return 200 "<!doctype html><title>NGINX</title><h1>It works!</h1><p>Inline fallback page.</p>";
        }

        location / { 
            try_files $uri $uri/ =404;  # serve static files or return 404 or fallback to index.html
        }

        location /api/ {
            proxy_pass http://127.0.0.1:3000/;  # proxy to backend server
            proxy_set_header Host $host;  # preserve original Host header
            proxy_set_header X-Real-IP $remote_addr;  # pass client IP to backend
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # add client IP to X-Forwarded-For header
            proxy_set_header X-Forwarded-Proto $scheme;  # pass original protocol (http/https) to backend
        }
    }

    server {
        listen 5000;
        server_name app1.local;
        root C:/Users/User/PROS/nginx_Intro/Lesson_1;  # document root for static files
        index index.html;  # default file to serve at /

        # TODO: Add exact-match location for root path (/) that tries index.html first, then falls back to @inline
        location = / { 
            try_files /index.html @inline; 
        }

        # TODO: Add named location @inline that returns inline HTML with status 200
        location @inline {
            default_type text/html;
            return 200 "<!doctype html><title>NGINX</title><h1>It works!</h1><p>Inline fallback page.</p>";
        }

        location / { 
            try_files $uri $uri/ index.html;  # serve static files or return 404 or fallback to index.html
        }

        location /api/ {
            proxy_pass http://127.0.0.1:3001/;  # proxy to backend server
            proxy_set_header Host $host;  # preserve original Host header
            proxy_set_header X-Real-IP $remote_addr;  # pass client IP to backend
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # add client IP to X-Forwarded-For header
            proxy_set_header X-Forwarded-Proto $scheme;  # pass original protocol (http/https) to backend
        }
    }

    server {
        listen 5000;
        server_name app2.local;
        root C:/Users/User/PROS/nginx_Intro/Lesson_3;  # document root for static files
        index about.html;  # default file to serve at /

        # TODO: Add exact-match location for root path (/) that tries index.html first, then falls back to @inline
