worker_processes 1;
events { 
    worker_connections 1024; 
}
http {
  include mime.types;
  default_type text/plain;
  
  proxy_cache_path /tmp/nginx_cache 
    levels=1:2 
    keys_zone=api_cache:10m 
    max_size=100m 
    inactive=60m 
    use_temp_path=off;

  upstream backend {
    server 127.0.0.1:5000;
    server 127.0.0.1:5001;
    server 127.0.0.1:5002;
  }

  upstream least_conn_backend {
    least_conn;
    server 127.0.0.1:5000;
    server 127.0.0.1:5001;
    server 127.0.0.1:5002;
  }

  upstream sticky_backend {
    ip_hash;
    server 127.0.0.1:5000;
    server 127.0.0.1:5001;
    server 127.0.0.1:5002;
  }

  upstream hash_backend {
    hash $request_uri consistent;
    server 127.0.0.1:5000;
    server 127.0.0.1:5001;
    server 127.0.0.1:5002;
  }

  upstream weighted_backend {
    server 127.0.0.1:5000 weight=3;
    server 127.0.0.1:5001 weight=2;
    server 127.0.0.1:5002 weight=1;
  }
  
  server {
    listen 3000;
    server_name localhost;
    
    location / {
      proxy_pass http://backend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header X-Upstream-Addr $upstream_addr always;
    }

    location /least-conn/ {
      proxy_pass http://least_conn_backend/;
      add_header X-LB-Method "least_conn" always;
      add_header X-Upstream-Addr $upstream_addr always;
    }

    location /sticky/ {
      proxy_pass http://sticky_backend/;
      add_header X-LB-Method "ip_hash" always;
      add_header X-Upstream-Addr $upstream_addr always;
    }

    location /hash/ {
      proxy_pass http://hash_backend/;
      add_header X-LB-Method "hash" always;
      add_header X-Upstream-Addr $upstream_addr always;
    }

    location /weighted/ {
      proxy_pass http://weighted_backend/;
      add_header X-LB-Method "weighted" always;
      add_header X-Upstream-Addr $upstream_addr always;
    }

    location /api/public/ {
      proxy_cache api_cache;
      proxy_cache_key "$scheme$proxy_host$request_uri$is_args$args";
      proxy_cache_valid 200 5m;
      proxy_cache_valid 404 1m;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_background_update on;
      proxy_cache_lock on;
      add_header X-Cache-Status $upstream_cache_status always;
      
      proxy_pass http://backend/;
      proxy_set_header Host $host;
    }
    
    location /api/private/ {
      proxy_no_cache 1;
      proxy_cache_bypass 1;
      add_header X-Cache-Status "BYPASS" always;
      
      proxy_pass http://backend/;
      proxy_set_header Host $host;
    }
  }
}