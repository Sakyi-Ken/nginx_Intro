worker_processes 1;
events { 
  worker_connections 1024;
}
http {
  include mime.types;
  default_type text/plain;
  
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/rss+xml
    application/atom+xml
    image/svg+xml
    text/csv;
  
  proxy_cache_path /tmp/nginx_cache 
    levels=1:2 
    keys_zone=api_cache:10m 
    max_size=100m 
    inactive=60m 
    use_temp_path=off;

  upstream backend {
    server 127.0.0.1:5000;
    server 127.0.0.1:5001;
    server 127.0.0.1:5002;
  }

  upstream least_conn_backend {
    least_conn;
    server 127.0.0.1:5000;
    server 127.0.0.1:5001;
    server 127.0.0.1:5002;
  }

  upstream sticky_backend {
    ip_hash;
    server 127.0.0.1:5000;
    server 127.0.0.1:5001;
    server 127.0.0.1:5002;
  }

  upstream hash_backend {
    hash $request_uri consistent;
    server 127.0.0.1:5000;
    server 127.0.0.1:5001;
    server 127.0.0.1:5002;
  }

  upstream weighted_backend {
    server 127.0.0.1:5000 weight=3;
    server 127.0.0.1:5001 weight=2;
    server 127.0.0.1:5002 weight=1;
  }
  
  server {
    listen 3000;
    server_name localhost;
    
    location / {
      proxy_pass http://backend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Accept-Encoding gzip;
      add_header X-Upstream-Addr $upstream_addr always;
    }

    location /least-conn/ {
      proxy_pass http://least_conn_backend/;
      add_header X-LB-Method "least_conn" always;
      add_header X-Upstream-Addr $upstream_addr always;
    }

    location /sticky/ {
      proxy_pass http://sticky_backend/;
      add_header X-LB-Method "ip_hash" always;
      add_header X-Upstream-Addr $upstream_addr always;
    }

    location /hash/ {
      proxy_pass http://hash_backend/;
      add_header X-LB-Method "hash" always;
      add_header X-Upstream-Addr $upstream_addr always;
    }

    location /weighted/ {
      proxy_pass http://weighted_backend/;
      add_header X-LB-Method "weighted" always;
      add_header X-Upstream-Addr $upstream_addr always;
    }

    location /api/public/ {
      proxy_cache api_cache;
      proxy_cache_key "$scheme$proxy_host$request_uri$is_args$args";
      proxy_cache_valid 200 5m;
      proxy_cache_valid 404 1m;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_background_update on;
      proxy_cache_lock on;
      add_header X-Cache-Status $upstream_cache_status always;
      
      proxy_pass http://backend/;
      proxy_set_header Host $host;
    }
    
    location /api/private/ {
      proxy_no_cache 1;
      proxy_cache_bypass 1;
      add_header X-Cache-Status "BYPASS" always;
      
      proxy_pass http://backend/;
      proxy_set_header Host $host;
    }

    location /static/compressed/ {
      alias static/;
      gzip_static on;
    }
    
    location /static/uncompressed/ {
      alias static/;
      gzip off;
      add_header X-Compression "disabled" always;
    }
    
    location /test-size {
      add_header Content-Type text/plain;
      add_header X-Original-Size "1024" always;
      return 200 "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum. Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium, totam rem aperiam, eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo. Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit, sed quia consequuntur magni dolores eos qui ratione voluptatem sequi nesciunt. Neque porro quisquam est, qui dolorem ipsum quia dolor sit amet, consectetur, adipisci velit, sed quia non numquam eius modi tempora incidunt ut labore et dolore magnam aliquam quaerat voluptatem";
    }
  }
}