worker_processes 1;
events { 
    worker_connections 1024; 
}

http {
    server {
        listen 3000;
        server_name localhost;
    
        # Our Lua-powered locations will go here
        location /hello {
            default_type text/plain;
            content_by_lua_block {
                ngx.say("Hello from Lua!")
                ngx.say("Time: ", ngx.now())
            }
        }

        location /info {
            default_type text/plain;
            content_by_lua_block {
                ngx.say("Method: ", ngx.var.request_method)
                ngx.say("URI: ", ngx.var.uri)
                ngx.say("Args: ", ngx.var.args)
                ngx.say("Remote IP: ", ngx.var.remote_addr)
            }
        }

        location /access-check {
            access_by_lua_block {
                local hour = tonumber(os.date("%H"))
                if hour < 9 or hour > 17 then
                ngx.exit(403)
                end
            }
            default_type text/plain;
            return 200 "Access granted during business hours";
        }

        location /logged {
            default_type text/plain;
            content_by_lua_block {
                ngx.say("Processing request...")
            }
            log_by_lua_block {
                local duration = ngx.now() - ngx.req.start_time()
                ngx.log(ngx.INFO, "Request took ", duration, " seconds")
            }
        }
    }
}